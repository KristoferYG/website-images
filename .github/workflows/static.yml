<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic YT Player</title>
    <style>
        body { margin: 0; background: #000; display: flex; height: 100vh; align-items: center; justify-content: center; font-family: sans-serif; color: white; }
        iframe { border: none; width: 100%; height: 100%; }
        #error-msg { text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="player-container" style="width: 100%; height: 100%;">
        <div id="error-msg">
            <h2>No Video ID Found</h2>
            <p>Add <b>?v=VIDEO_ID</b> to the end of your URL.</p>
        </div>
    </div>

    <script>
        // 1. Get the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');

        // 2. If an ID exists, inject the iframe
        if (videoId) {
            const container = document.getElementById('player-container');
            container.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>`;
        }
    </script>
</body>
</html>
